<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI烧烤店SaaS - 智能餐饮管理系统</title>
<style>
:root {
  --p: #FF6B35; --a: #7C3AED; --bg: #0F0F1A; --bg2: #1A1A2E;
  --card: #1E1E35; --t1: #F0F0F5; --t2: #B0B0C0; --t3: #6B6B80;
  --s: #22C55E; --d: #EF4444; --w: #F59E0B; --i: #3B82F6;
  --border: rgba(255,255,255,0.06); --radius: 14px;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --sidebar-w: 240px; --header-h: 56px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}
.app{display:flex;min-height:100vh}
/* Sidebar */
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s}
.sidebar-logo{padding:20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sidebar-logo .logo-icon{font-size:28px}
.sidebar-logo .logo-text{font-size:18px;font-weight:800;color:var(--p);letter-spacing:-0.5px}
.sidebar-logo .logo-sub{font-size:11px;color:var(--t3);margin-top:2px}
.sidebar-nav{flex:1;padding:12px;overflow-y:auto}
.nav-section{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:16px 12px 8px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:14px;color:var(--t2);cursor:pointer;transition:.2s;margin:2px 0}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--t1)}
.nav-item.active{background:rgba(255,107,53,0.12);color:var(--p);font-weight:600}
.nav-item .ni-icon{font-size:18px;width:24px;text-align:center}
.nav-item .ni-badge{margin-left:auto;min-width:20px;height:20px;line-height:20px;text-align:center;background:var(--d);color:#fff;border-radius:10px;font-size:11px;font-weight:600}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.sidebar-footer .user-card{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;cursor:pointer;transition:.2s}
.sidebar-footer .user-card:hover{background:rgba(255,255,255,0.04)}
.sidebar-footer .uc-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--a));display:flex;align-items:center;justify-content:center;font-size:18px}
.sidebar-footer .uc-info{flex:1;overflow:hidden}
.sidebar-footer .uc-name{font-size:13px;font-weight:600;color:var(--t1)}
.sidebar-footer .uc-role{font-size:11px;color:var(--t3)}
/* Main */
.main{flex:1;margin-left:var(--sidebar-w);display:flex;flex-direction:column;min-height:100vh}
.header{height:var(--header-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
.header .page-title{font-size:18px;font-weight:700}
.header .header-actions{display:flex;align-items:center;gap:12px}
.header .ha-btn{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.04);border:none;color:var(--t2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.header .ha-btn:hover{background:rgba(255,255,255,0.08);color:var(--t1)}
.content{padding:20px 24px;flex:1}
/* Mobile */
.mobile-toggle{display:none;position:fixed;top:12px;left:12px;z-index:200;width:40px;height:40px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);color:var(--t1);font-size:20px;cursor:pointer;align-items:center;justify-content:center}
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .mobile-toggle{display:flex}
  .content{padding:14px}
  .header{padding:0 14px;padding-left:56px}
}
@media(max-width:640px){
  .content{padding:10px}
}
/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;transition:.2s}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:15px;font-weight:700}
.card-sub{font-size:12px;color:var(--t3)}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:900px){.grid4{grid-template-columns:repeat(2,1fr)}.grid3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.grid2,.grid3,.grid4{grid-template-columns:1fr}}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:.2s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--p),#E55A2B);color:#fff;box-shadow:0 2px 8px rgba(255,107,53,0.3)}
.btn-primary:hover{box-shadow:0 4px 16px rgba(255,107,53,0.4)}
.btn-outline{background:transparent;border:1.5px solid var(--p);color:var(--p)}
.btn-outline:hover{background:rgba(255,107,53,0.08)}
.btn-ghost{background:rgba(255,255,255,0.06);color:var(--t2)}
.btn-ghost:hover{background:rgba(255,255,255,0.1);color:var(--t1)}
.btn-success{background:var(--s);color:#fff}
.btn-danger{background:var(--d);color:#fff}
.btn-warn{background:var(--w);color:#000}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px}
.btn-lg{padding:14px 28px;font-size:16px;border-radius:12px}
.btn-block{width:100%}
.btn-xl{padding:18px 40px;font-size:18px;border-radius:14px;font-weight:700}
/* Stats */
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.stat-card .st-value{font-size:28px;font-weight:800;color:var(--p)}
.stat-card .st-label{font-size:12px;color:var(--t3);margin-top:4px}
.stat-card .st-change{font-size:12px;margin-top:4px;font-weight:600}
.stat-card .st-change.up{color:var(--s)}.stat-card .st-change.down{color:var(--d)}
.stat-card.warn .st-value{color:var(--d)}.stat-card.good .st-value{color:var(--s)}
.stat-card.accent .st-value{color:var(--a)}
/* Tables */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:12px 16px;background:rgba(255,255,255,0.02);color:var(--t3);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid var(--border);color:var(--t2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
/* Tags */
.tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.tag-orange{background:rgba(255,107,53,0.15);color:var(--p)}
.tag-green{background:rgba(34,197,94,0.15);color:var(--s)}
.tag-red{background:rgba(239,68,68,0.15);color:var(--d)}
.tag-yellow{background:rgba(245,158,11,0.15);color:var(--w)}
.tag-blue{background:rgba(59,130,246,0.15);color:var(--i)}
.tag-purple{background:rgba(124,58,237,0.15);color:var(--a)}
/* Product grid */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
@media(max-width:640px){.prod-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}}
.prod-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;gap:12px;transition:.2s;cursor:pointer}
.prod-card:hover{border-color:rgba(255,107,53,0.3)}
.prod-card .pc-img{width:64px;height:64px;border-radius:12px;background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0}
.prod-card .pc-info{flex:1;overflow:hidden}
.prod-card .pc-name{font-size:15px;font-weight:600;color:var(--t1)}
.prod-card .pc-desc{font-size:11px;color:var(--t3);margin-top:2px}
.prod-card .pc-price{font-size:18px;font-weight:700;color:var(--p);margin-top:4px}
.prod-card .pc-price .unit{font-size:11px;color:var(--t3);font-weight:400}
.prod-card .pc-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.prod-card .pc-add{width:36px;height:36px;border-radius:50%;background:var(--p);color:#fff;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.prod-card .pc-add:active{transform:scale(.9)}
.prod-card .pc-qty{display:flex;align-items:center;gap:6px}
.prod-card .pc-qty button{width:28px;height:28px;border-radius:50%;border:2px solid var(--p);background:transparent;color:var(--p);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.prod-card .pc-qty span{min-width:24px;text-align:center;font-weight:700;font-size:15px}
.prod-card .pc-badges{display:flex;gap:4px;margin-top:4px}
/* Categories */
.cat-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{padding:8px 16px;border-radius:20px;font-size:13px;color:var(--t2);background:rgba(255,255,255,0.04);white-space:nowrap;cursor:pointer;transition:.2s;border:none}
.cat-tab.active{background:var(--p);color:#fff;font-weight:600}
/* Cart bar */
.cart-bar{position:sticky;bottom:0;background:var(--bg2);border-top:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;margin:0 -24px;z-index:40}
@media(max-width:640px){.cart-bar{margin:0 -10px;padding:10px 14px}}
.cart-bar .cb-left{display:flex;align-items:center;gap:12px;cursor:pointer}
.cart-bar .cb-icon{width:44px;height:44px;border-radius:50%;background:var(--p);display:flex;align-items:center;justify-content:center;position:relative}
.cart-bar .cb-badge{position:absolute;top:-4px;right:-4px;min-width:20px;height:20px;line-height:20px;text-align:center;background:var(--d);color:#fff;border-radius:10px;font-size:11px;font-weight:700}
.cart-bar .cb-total{font-size:18px;font-weight:700;color:var(--p)}
.cart-bar .cb-submit{padding:12px 28px;background:var(--p);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
/* Tables */
.table-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px}
.table-card{padding:16px 12px;text-align:center;border-radius:12px;border:2px solid var(--border);cursor:pointer;transition:.2s}
.table-card:hover{border-color:var(--p)}
.table-card.free{background:rgba(34,197,94,0.05)}
.table-card.occupied{background:rgba(239,68,68,0.05);opacity:.5;pointer-events:none}
.table-card .tc-code{font-size:18px;font-weight:700;display:block}
.table-card .tc-cap{font-size:11px;color:var(--t3)}
.table-card .tc-status{font-size:10px;margin-top:4px;display:block}
.table-card.free .tc-status{color:var(--s)}.table-card.occupied .tc-status{color:var(--d)}
/* Modal */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;padding:24px;border:1px solid var(--border)}
.modal-sheet .ms-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-sheet .ms-title{font-size:17px;font-weight:700}
.modal-sheet .ms-close{font-size:20px;color:var(--t3);cursor:pointer;background:none;border:none}
/* Spice popup */
.spice-mask{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:310;display:flex;align-items:flex-end;justify-content:center}
.spice-popup{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:24px 20px;border:1px solid var(--border)}
.spice-popup .sp-close{float:right;font-size:20px;color:var(--t3);cursor:pointer;background:none;border:none}
.spice-popup .sp-name{font-size:20px;font-weight:700;margin-bottom:4px}
.spice-popup .sp-price{font-size:14px;color:var(--p);margin-bottom:20px}
.spice-popup .sp-section{margin-bottom:18px}
.spice-popup .sp-label{font-size:12px;color:var(--t3);margin-bottom:8px;display:block}
.spice-popup .sp-tags{display:flex;gap:8px;flex-wrap:wrap}
.spice-popup .sp-tag{padding:8px 18px;border-radius:20px;font-size:13px;color:var(--t2);background:rgba(255,255,255,0.04);border:1.5px solid transparent;cursor:pointer;transition:.2s}
.spice-popup .sp-tag.active{border-color:var(--p);color:var(--p);background:rgba(255,107,53,0.1)}
.spice-popup .sp-qty-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px solid var(--border)}
.spice-popup .sp-qty-ctrl{display:flex;align-items:center;gap:12px}
.spice-popup .sp-qty-ctrl button{width:34px;height:34px;border-radius:50%;border:2px solid var(--p);background:transparent;color:var(--p);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.spice-popup .sp-qty-ctrl span{min-width:28px;text-align:center;font-size:17px;font-weight:700}
.spice-popup .sp-footer{margin-top:8px;padding:12px;background:linear-gradient(135deg,rgba(255,107,53,0.12),rgba(255,149,0,0.08));border-radius:12px;border:1px solid rgba(255,107,53,0.25)}
.spice-popup .sp-add-btn{width:100%;padding:12px;background:linear-gradient(135deg,#FF6B35,#FF8C00);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
/* Kitchen order card */
.kitchen-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.kitchen-card.urgent{border-left:3px solid var(--d);background:rgba(239,68,68,0.04)}
.kitchen-card .kc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.kitchen-card .kc-table{font-size:17px;font-weight:700}
.kitchen-card .kc-time{font-size:12px;color:var(--t3)}
.kitchen-card .kc-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.kitchen-card .kc-item:last-child{border-bottom:none}
.kitchen-card .kc-item.done{opacity:.4;text-decoration:line-through}
.kitchen-card .kc-item-name{font-size:14px}
.kitchen-card .kc-item-qty{font-size:16px;font-weight:700;color:var(--p);margin-right:12px}
/* Chat */
.chat-area{display:flex;flex-direction:column;height:calc(100vh - var(--header-h) - 80px)}
.chat-messages{flex:1;overflow-y:auto;padding:12px 0}
.chat-msg{margin-bottom:14px;animation:msgIn .3s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.chat-msg.user{display:flex;justify-content:flex-end}
.chat-msg .bubble{display:inline-block;max-width:80%;padding:10px 16px;border-radius:12px;font-size:14px;line-height:1.6;white-space:pre-wrap}
.chat-msg.ai .bubble{background:rgba(255,255,255,0.04);color:var(--t1);border-bottom-left-radius:4px}
.chat-msg.user .bubble{background:rgba(255,107,53,0.15);color:var(--t1);border-bottom-right-radius:4px}
.chat-input-area{display:flex;gap:8px;padding:12px 0;border-top:1px solid var(--border)}
.chat-input-area input{flex:1;height:42px;padding:0 16px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:21px;font-size:14px;color:var(--t1);outline:none}
.chat-input-area input::placeholder{color:var(--t3)}
.chat-input-area button{padding:10px 20px;background:var(--p);color:#fff;border:none;border-radius:21px;font-size:14px;font-weight:600;cursor:pointer}
.quick-words{display:flex;gap:6px;padding:8px 0;flex-wrap:wrap}
.quick-words span{padding:6px 14px;background:rgba(255,255,255,0.04);border-radius:16px;font-size:12px;color:var(--t2);cursor:pointer;transition:.2s}
.quick-words span:hover{background:rgba(255,107,53,0.1);color:var(--p)}
/* Toast */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.88);color:#fff;padding:10px 24px;border-radius:10px;font-size:14px;z-index:999;pointer-events:none;opacity:0;transition:opacity .25s}
.toast.show{opacity:1}
/* Bar chart */
.bar-item{display:flex;align-items:center;gap:10px;padding:6px 0}
.bar-label{font-size:12px;color:var(--t2);min-width:60px;text-align:right}
.bar-track{flex:1;height:20px;background:rgba(255,255,255,0.03);border-radius:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:10px;transition:width .6s ease}
.bar-val{font-size:11px;color:var(--t3);min-width:40px}
/* Login */
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:48px 40px;max-width:420px;width:100%;text-align:center}
.login-card .lc-icon{font-size:56px;margin-bottom:16px}
.login-card .lc-title{font-size:28px;font-weight:800;color:var(--p);margin-bottom:4px}
.login-card .lc-sub{font-size:14px;color:var(--t3);margin-bottom:32px}
.login-card .lc-features{text-align:left;margin-bottom:32px}
.login-card .lc-feat{display:flex;align-items:center;padding:8px 0;font-size:14px;color:var(--t2);gap:10px}
.login-card .lc-feat .lcf-icon{font-size:18px}
.login-card .lc-btn{width:100%;height:50px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;border:none;margin-bottom:10px;transition:.2s}
.login-card .lc-btn:active{transform:scale(.98)}
.lc-btn-customer{background:linear-gradient(90deg,#07C160,#06AD56);color:#fff}
.lc-btn-staff{background:linear-gradient(90deg,var(--p),#E55A2B);color:#fff}
/* Utilities */
.text-center{text-align:center}
.text-right{text-align:right}
.text-sm{font-size:12px}
.text-xs{font-size:11px}
.text-muted{color:var(--t3)}
.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mt-6{margin-top:24px}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.flex-1{flex:1}
.hidden{display:none !important}
/* Empty */
.empty-state{text-align:center;padding:60px 20px;color:var(--t3)}
.empty-state .es-icon{font-size:48px;margin-bottom:12px}
.empty-state .es-text{font-size:14px}
/* Version compare */
.ver-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ver-col{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center}
.ver-col.pro{border-color:var(--a);background:rgba(124,58,237,0.04)}
.ver-col .vc-name{font-size:16px;font-weight:700;display:block}
.ver-col.pro .vc-name{color:var(--a)}
.ver-col .vc-price{font-size:28px;font-weight:800;color:var(--p);display:block;margin:8px 0}
.ver-col.pro .vc-price{color:var(--a)}
.ver-col .vc-desc{font-size:11px;color:var(--t3)}
.ver-col .vc-feats{margin-top:16px;text-align:left}
.ver-col .vc-feat{font-size:13px;padding:4px 0;color:var(--t2)}
.ver-col .vc-feat.no{color:var(--t3);text-decoration:line-through}
/* Order detail */
.order-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;border-left:3px solid var(--p)}
.order-card .oc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.order-card .oc-no{font-size:13px;color:var(--p);font-weight:700}
.order-card .oc-table{font-size:14px;font-weight:600;color:var(--t1)}
.order-card .oc-time{font-size:11px;color:var(--t3)}

      var to={tableCode:order.table,people:tableInfo?tableInfo.cap:4,items:[],orderNo:order.no};
      var now=new Date();var parts=order.time.split(':');
      var openDate=new Date(now.getFullYear(),now.getMonth(),now.getDate(),parseInt(parts[0]),parseInt(parts[1]));
      to.elapsed=Math.max(1,Math.floor((now-openDate)/(1000*60)));
      to.openTime=order.time;
      order.items.forEach(function(item){
        var product=DB.products.find(function(p){return p.name===item.name});
        var tag=product?product.tag:'bbq';
        var station=tag==='drink'?'饮料台':tag==='fried'?'炸台':tag==='cold'?'凉菜台':tag==='seafood'?'海鲜台':'烤台';
        to.items.push({name:item.name,spice:item.spice||'默认',qty:item.qty,status:item.status==='served'?'served':(item.status==='cooked'?'cooked':'pending'),station:station,tag:tag});
        if(item.status!=='served')self.allOrders.push({tableCode:order.table,name:item.name,spice:item.spice||'默认',qty:item.qty,status:item.status==='cooked'?'cooked':'pending',station:station});
      });
      if(to.items.length>0)self.tableOrders.push(to);
    });
  }
};

// ========== BUILD REALTIME CONTEXT FOR AI ==========
// 每次对话前实时扫描数据库，确保DeepSeek拿到的是老板最新改过的数据
function buildRealtimeContext(tableCode){
  var ctx='';

  // 1. 桌台信息：区域+容量
  var tableInfo=null, areaName='未知区域';
  DB.tables.areas.forEach(function(a){
    a.tables.forEach(function(t){
      if(t.code===tableCode){tableInfo=t;areaName=a.name;}
    });
  });
  ctx+='## 🪑 当前桌台\n';
  ctx+='- 桌号：'+tableCode+'（位于【'+areaName+'】）\n';
  ctx+='- 容量：'+(tableInfo?tableInfo.cap:'?')+'人\n';
  ctx+='- 这是你唯一服务的桌台，别搞混\n\n';

  // 2. 口味规则：每个品类能选什么口味
  ctx+='## 🌶️ 口味规则（按品类）\n';
  DB.cats.forEach(function(c){
    var sample=DB.products.find(function(p){return p.cat===c.type});
    if(!sample)return;
    if(c.type==='drink'){
      ctx+='- '+c.emoji+' '+c.name+'：去冰 / 少冰 / 正常冰\n';
    }else if(c.type==='cold'||c.type==='staple'){
      ctx+='- '+c.emoji+' '+c.name+'：默认即可，无需选口味\n';
    }else{
      ctx+='- '+c.emoji+' '+c.name+'：不辣 / 微辣 / 中辣 / 特辣\n';
    }
  });

  // 3. 菜单+库存+价格（实时）
  ctx+='\n## 📋 完整菜单（价格/库存均为老板最新设置）\n';
  DB.cats.forEach(function(c){
    var items=DB.products.filter(function(p){return p.cat===c.type});
    var hasStockIssue=items.some(function(p){return p.stock<=0||p.stock<=p.alert});
    ctx+='### '+c.emoji+' '+c.name+(hasStockIssue?' ⚠️':'')+'\n';
    items.forEach(function(p){
      var status='';
      if(p.stock<=0)status=' 【售罄！不可点】';
      else if(p.stock<=p.alert)status=' 【仅剩'+p.stock+p.unit+'，快没了】';
      ctx+='- '+p.name+'：¥'+p.price+'/'+p.unit+status+'\n';
    });
  });

  // 4. 今日热销（实时）
  ctx+='\n## 🔥 今日热销TOP5\n';
  DB.reports.hot.slice(0,5).forEach(function(h,i){
    ctx+='- '+(i+1)+'. '+h.name+'（已售'+h.qty+'份）\n';
  });

  // 5. 铁规则
  ctx+='\n## ⚡ 铁规则\n';
  ctx+='- 只能点菜单上有的菜，售罄的告知客人并推荐替代品\n';
  ctx+='- 桌号固定为【'+tableCode+'】，死也不能改\n';
  ctx+='- place_order时每项必须包含 name、qty、price、spice';

  return ctx;
}

    headers:{'Content-Type':'application/json','Authorization':'Bearer sk-YOUR_DEEPSEEK_API_KEY'},
    body:JSON.stringify({
      model:'deepseek-chat',
      messages:[
        {role:'system',content:sysPrompt}
      ].concat(aiMessages.filter(function(m){return m.content!=='__TYPING__'}).map(function(m){return{role:m.role==='ai'?'assistant':m.role,content:m.content}})),
      tools:[{
        type:'function',
        function:{
          name:'place_order',
          description:'客人确认要下单了，调用此函数提交订单。系统会自动弹出确认/取消按钮让客人最后把关。',
          parameters:{
            type:'object',
            properties:{
              table_code:{type:'string',description:'桌台号，必须是'+tableCode},
              items:{type:'array',items:{type:'object',properties:{name:{type:'string',description:'菜品名称，必须和菜单一字不差'},qty:{type:'integer',description:'数量'},price:{type:'number',description:'单价'},spice:{type:'string',description:'口味辣度或冰量'}},required:['name','qty','price']},description:'订单明细'},
              total_price:{type:'number',description:'总价，等于每项 price×qty 之和'},
              note:{type:'string',description:'备注，可选'}
            },
            required:['table_code','items','total_price']
          }
        }
      }],
      temperature:0.7,
      max_tokens:1024
    })
  }).then(function(r){return r.ok?r.json():r.text().then(function(t){throw new Error('API返回 HTTP '+r.status+': '+t.substring(0,200));});})
  .then(function(d){
    aiIsLoading=false;
    aiApiOnline=true;
    aiMessages=aiMessages.filter(function(m){return m.content!=='__TYPING__'});

    if(!msg){aiMessages.push({role:'ai',content:'AI大脑短路了，稍后再试试？'});renderPage();return;}

    // Check for tool calls — DeepSeek 决定下单了
    if(msg.tool_calls&&msg.tool_calls.length>0){
      var toolCall=msg.tool_calls[0];
      if(toolCall.function.name==='place_order'){
        var args;
        try{args=JSON.parse(toolCall.function.arguments);}catch(e){args=null;}
        if(args&&args.items&&args.items.length>0){
          if(msg.content&&msg.content.trim())aiMessages.push({role:'ai',content:msg.content});

          scrollChatBottom();

    aiMessages.push({role:'ai',content:'⚠️ DeepSeek连接失败，原因：'+errMsg+'\n\n先用本地助手顶着，检查一下网络或API Key。'});
    renderPage();
    scrollChatBottom();
  });
}

// ========== LOCAL FALLBACK AI ==========
function smartAI(txt){
  // Check for ordering intent locally
  var menuItems=DB.products.filter(function(p){return p.stock>0});
  var mentioned=menuItems.filter(function(p){return txt.indexOf(p.name)>=0});

  if(mentioned.length>0){
    var total=0;
    var lines=mentioned.map(function(p){
      var qtyMatch=txt.match(new RegExp(p.name+'\\s*(\\d+)'));
      var qty=qtyMatch?parseInt(qtyMatch[1]):1;
      total+=p.price*qty;
      return p.emoji+' '+p.name+' ×'+qty+' = ¥'+(p.price*qty).toFixed(2);
    });
    lines.push('');
    lines.push('💰 总价：¥'+total.toFixed(2));
    lines.push('');
    lines.push('请说"确认下单"来提交订单，或告诉我需要修改的地方。');
    return lines.join('\n');
  }

  if(txt.indexOf('热销')>=0||txt.indexOf('卖得好')>=0){
    var hot=DB.reports.hot.slice(0,3);
    return '根据今日销售数据：\n\n🥇 '+hot[0].name+'（已售'+hot[0].qty+'份）\n🥈 '+hot[1].name+'（已售'+hot[1].qty+'份）\n🥉 '+hot[2].name+'（已售'+hot[2].qty+'份）';
  }
  var nums=(txt.match(/\d+/g)||[]).map(function(n){return parseInt(n)});
  var people=nums.length>0?nums[0]:3;

function checkoutOrder(oid){
  var o=DB.orders.find(function(x){return x.id===oid});if(!o)return;
  o.items.forEach(function(item){item.price=item.price||(DB.products.find(function(p){return p.name===item.name})||{}).price||0;});
  if(!confirm('确认【'+o.table+'】结账？\n订单号：'+o.no+'\n金额：¥'+o.items.reduce(function(s,i){return s+i.price*i.qty},0).toFixed(2)))return;
  // Move to history
  o.checkoutTime=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  DB.orderHistory.push(o);
  // Remove from active orders
  DB.orders=DB.orders.filter(function(x){return x.id!==oid});
  // Free the table
  DB.tables.areas.forEach(function(a){a.tables.forEach(function(t){if(t.code===o.table)t.status='free';})});
  KDS.init();toast('结账成功！'+o.table+' 已释放');renderPage();
}

      alerts.forEach(function(p){html+='<div class="card" style="border-left:3px solid var(--d)"><div class="flex justify-between items-center"><div><div style="font-weight:600">'+p.emoji+' '+p.name+'</div><div class="text-sm text-muted">仅剩'+p.stock+p.unit+'（预警线'+p.alert+'）</div></div><button class="btn btn-sm btn-outline" onclick="adjustStock('+p.id+','+(p.alert-p.stock+10)+');updateUI()">补货</button></div></div>';});
    }
  }else if(invTab==='log'){
    DB.totalFlowLog.forEach(function(l){html+='<div class="card" style="padding:12px 16px;margin-bottom:8px"><div class="flex justify-between"><span>'+(l.type==='in'?'📥':'📤')+' <b>'+l.product+'</b> <span style="color:'+(l.type==='in'?'var(--s)':'var(--d)')+';font-weight:700">'+(l.type==='in'?'+'+l.qty:'-'+l.qty)+'</span></span><span class="text-xs text-muted">'+l.time+'</span></div><div class="text-xs text-muted mt-2">'+(l.operator?'操作人: '+l.operator:'订单: '+l.order)+'</div></div>';});
  }
  return html;
}

function renderReports(){
  var html='<div class="cat-tabs">'+['daily','monthly','hot','biz','alert'].map(function(t){var names={daily:'日报',monthly:'月报',hot:'热销',biz:'经营分析',alert:'预警'};return'<button class="cat-tab '+(reportTab===t?'active':'')+'" onclick="reportTab=\''+t+'\';updateUI()">'+names[t]+'</button>';}).join('')+'</div>';
  if(reportTab==='daily'||reportTab==='monthly'){
    var d=DB.reports[reportTab];
    html+='<div class="grid3"><div class="stat-card"><div class="st-value">'+d.orders+'</div><div class="st-label">订单数</div></div><div class="stat-card"><div class="st-value">¥'+d.revenue+'</div><div class="st-label">总营收</div></div><div class="stat-card accent"><div class="st-value">¥'+(d.revenue/d.orders).toFixed(0)+'</div><div class="st-label">客单价</div></div></div>';
  }else if(reportTab==='hot'){
    DB.reports.hot.forEach(function(h,i){
      html+='<div class="card" style="padding:12px 16px;margin-bottom:8px"><div class="flex items-center gap-3"><span style="width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:'+(i===0?'var(--p)':i===1?'var(--a)':i===2?'var(--w)':'rgba(255,255,255,0.06)')+';color:'+(i<2?'#fff':i===2?'#000':'var(--t2)')+'">'+(i+1)+'</span><span style="flex:1;font-weight:500">'+h.name+'</span><span style="font-size:18px;font-weight:700;color:var(--p)">'+h.qty+'串</span></div></div>';
    });
  }else if(reportTab==='biz'){
    var trend=DB.deepData.avgOrderTrend;var td=DB.deepData.tableTurnover;
    html+='<div class="grid2 mb-4"><div class="stat-card"><div class="st-value">¥'+trend[trend.length-1].toFixed(1)+'</div><div class="st-label">今日客单价</div></div><div class="stat-card good"><div class="st-value">'+td.avg+'次</div><div class="st-label">日均翻台率</div></div></div>';
    html+='<div class="card"><div class="card-title mb-3">📊 畅销时段分布</div>';
    var maxO=Math.max.apply(null,DB.deepData.peakHours.map(function(h){return h.orders}));
    DB.deepData.peakHours.forEach(function(h){html+='<div class="bar-item"><span class="bar-label">'+h.hour+'</span><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(h.orders/maxO*100)+'%;background:linear-gradient(90deg,var(--p),#FF8C00)"></div></div><span class="bar-val">'+h.orders+'单 ¥'+h.revenue+'</span></div>';});
    html+='</div>';
  }else if(reportTab==='alert'){
    DB.deepData.anomalyAlerts.forEach(function(a){html+='<div class="card" style="border-left:3px solid '+(a.level==='high'?'var(--d)':'var(--w)')+';margin-bottom:8px"><div class="flex justify-between"><div><div style="font-weight:600">'+a.type+'</div><div class="text-sm text-muted">'+a.desc+'</div></div><div><span class="tag '+(a.level==='high'?'tag-red':'tag-yellow')+'">'+(a.level==='high'?'高风险':'中风险')+'</span><div class="text-xs text-muted text-right mt-2">'+a.time+'</div></div></div></div>';});
  }
  return html;
}

function renderCustomers(){

  DB.deepData.customerSegments.forEach(function(s){html+='<div class="card" style="padding:12px 16px;margin-bottom:8px"><div class="flex justify-between items-center"><div><div style="font-weight:600">'+s.type+'</div><div class="text-xs text-muted">人均¥'+s.avgSpend.toFixed(1)+' · 月均'+s.freq.toFixed(1)+'次</div></div><span style="font-size:18px;font-weight:700;color:var(--p)">'+(s.pct*100).toFixed(0)+'%</span></div></div>';});
  html+='</div><div class="card"><div class="card-title mb-3">🌶️ 口味偏好</div>';
  DB.deepData.tastePreference.forEach(function(t){html+='<div class="bar-item"><span class="bar-label">'+t.taste+'</span><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(t.pct*100)+'%;background:linear-gradient(90deg,var(--p),var(--d))"></div></div><span class="bar-val">'+(t.pct*100).toFixed(0)+'% · ¥'+t.avgSpend.toFixed(1)+'</span></div>';});

function renderTablesMgr(){
  var html='';
  DB.tables.areas.forEach(function(a){
    html+='<div class="card"><div class="card-header"><span style="font-weight:700;font-size:15px">'+a.name+'</span><div class="flex gap-2"><button class="btn btn-sm btn-outline" onclick="addTableToArea('+a.id+')">+ 桌台</button><button class="btn btn-sm btn-danger" onclick="deleteArea('+a.id+')">删除区域</button></div></div><div class="grid4">';
    a.tables.forEach(function(t){
      html+='<div class="table-card '+t.status+'" onclick="editTable('+a.id+','+t.id+')"><span class="tc-code">'+t.code+'</span><span class="tc-cap">'+t.cap+'人</span><span class="tc-status">'+(t.status==='free'?'空闲':'使用中')+'</span><span class="tc-del" onclick="event.stopPropagation();deleteTable('+a.id+','+t.id+')" title="删除桌台">✕</span></div>';
    });
    html+='</div></div>';
  });
  html+='<button class="btn btn-primary btn-block mt-3" onclick="addArea()">+ 新建区域</button>';
  return html;
}

function addTableToArea(aid){
  var area=DB.tables.areas.find(function(a){return a.id===aid});if(!area)return;
  var code=prompt('桌号（如 A06）：');if(!code||!code.trim())return;
  var cap=parseInt(prompt('容纳人数（默认4）：')||'4');
  var maxId=0;DB.tables.areas.forEach(function(a){a.tables.forEach(function(t){if(t.id>maxId)maxId=t.id})});
  area.tables.push({id:maxId+1,code:code.trim(),cap:cap,status:'free'});toast('桌台 '+code.trim()+' 已添加');updateUI();
}
function deleteArea(aid){if(!confirm('确定删除该区域及所有桌台？'))return;DB.tables.areas=DB.tables.areas.filter(function(a){return a.id!==aid});toast('区域已删除');updateUI();}
function addArea(){
  var name=prompt('区域名称（如：户外、二楼）：');if(!name||!name.trim())return;
  DB.tables.areas.push({id:DB.tables.areas.length+1,name:name.trim(),tables:[]});toast('区域已添加');updateUI();
}
function deleteTable(aid,tid){
  if(!confirm('确定删除该桌台？'))return;
  var area=DB.tables.areas.find(function(a){return a.id===aid});if(!area)return;
  area.tables=area.tables.filter(function(t){return t.id!==tid});toast('桌台已删除');updateUI();
}
function editTable(aid,tid){
  var area=DB.tables.areas.find(function(a){return a.id===aid});if(!area)return;
  var table=area.tables.find(function(t){return t.id===tid});if(!table)return;
  var newCode=prompt('新桌号：',table.code);if(!newCode||!newCode.trim())return;
  var newCap=parseInt(prompt('新容纳人数：',table.cap));if(isNaN(newCap)||newCap<1)return;
  table.code=newCode.trim();table.cap=newCap;toast('桌台已更新');updateUI();
}

function renderMenuMgr(){
  var html='<div class="card"><div class="card-header"><span style="font-weight:700;font-size:15px">菜品分类</span><button class="btn btn-sm btn-outline" onclick="addCat()">+ 分类</button></div><div class="flex flex-wrap gap-2 mb-3">';
  DB.cats.forEach(function(c){
    var cnt=DB.products.filter(function(p){return p.cat===c.type}).length;
    html+='<div class="tag" style="cursor:pointer;padding:6px 12px" onclick="editCat('+c.id+')">'+c.emoji+' '+c.name+'（'+cnt+'）<span style="margin-left:4px;opacity:0.5" onclick="event.stopPropagation();deleteCat('+c.id+')" title="删除分类">✕</span></div>';
  });
  html+='</div></div><div class="card"><div class="card-header"><span style="font-weight:700;font-size:15px">菜品列表</span><button class="btn btn-sm btn-primary" onclick="addProduct()">+ 菜品</button></div>';
  html+='<table style="width:100%;font-size:13px;text-align:left"><thead><tr><th>名称</th><th>分类</th><th>单价</th><th>单位</th><th>库存</th><th>警戒</th><th>热销</th><th>操作</th></tr></thead><tbody>';
  DB.products.forEach(function(p){
    var cat=DB.cats.find(function(c){return c.type===p.cat});
    html+='<tr><td>'+p.emoji+' '+p.name+'</td><td>'+(cat?cat.name:p.cat)+'</td><td>¥'+p.price+'</td><td>'+p.unit+'</td><td>'+p.stock+'</td><td>'+p.alert+'</td><td>'+(p.hot?'🔥':'')+'</td><td><button class="btn btn-sm btn-outline" onclick="editProduct('+p.id+')">编辑</button> <button class="btn btn-sm btn-danger" onclick="deleteProduct('+p.id+')">删除</button></td></tr>';
  });
  html+='</tbody></table></div>';
  return html;
}
function addCat(){
  var name=prompt('分类名称（如：小食、套餐）：');if(!name||!name.trim())return;
  var type=prompt('分类标识（英文，如：snack）：');if(!type||!type.trim())return;
  if(DB.cats.find(function(c){return c.type===type.trim()})){toast('该标识已存在');return;}
  var emoji=prompt('图标emoji：')||'🍽️';
  var maxId=0;DB.cats.forEach(function(c){if(c.id>maxId)maxId=c.id});
  DB.cats.push({id:maxId+1,name:name.trim(),type:type.trim(),emoji:emoji});toast('分类已添加');updateUI();
}
function editCat(cid){
  var cat=DB.cats.find(function(c){return c.id===cid});if(!cat)return;
  var name=prompt('新分类名称：',cat.name);if(!name||!name.trim())return;
  var emoji=prompt('新图标：',cat.emoji);
  cat.name=name.trim();cat.emoji=emoji||cat.emoji;toast('分类已更新');updateUI();
}
function deleteCat(cid){
  var cat=DB.cats.find(function(c){return c.id===cid});if(!cat)return;
  if(DB.products.some(function(p){return p.cat===cat.type})){toast('该分类下还有菜品，无法删除');return;}
  if(!confirm('确定删除分类「'+cat.name+'」？'))return;
  DB.cats=DB.cats.filter(function(c){return c.id!==cid});toast('分类已删除');updateUI();
}
function addProduct(){
  var name=prompt('菜品名称：');if(!name||!name.trim())return;
  var price=parseFloat(prompt('单价（元）：'));if(isNaN(price)||price<=0)return;
  var unit=prompt('单位（如：串/份/瓶）：')||'份';
  var desc=prompt('描述：')||'';
  var catOptions=DB.cats.map(function(c){return c.type+'='+c.name}).join(', ');
  var cat=prompt('分类（'+catOptions+'）：');if(!cat||!cat.trim())return;
  if(!DB.cats.find(function(c){return c.type===cat.trim()})){toast('分类不存在');return;}
  var stock=parseInt(prompt('库存：')||'0');
  var alert=parseInt(prompt('库存预警值：')||'10');
  var emoji=prompt('emoji图标：')||'🍽️';
  var hot=confirm('是否设为热销？');
  var maxId=0;DB.products.forEach(function(p){if(p.id>maxId)maxId=p.id});
  DB.products.push({id:maxId+1,name:name.trim(),price:price,unit:unit,desc:desc,cat:cat.trim(),tag:cat.trim(),stock:stock,alert:alert,hot:hot,emoji:emoji});toast('菜品已添加');updateUI();
}
function editProduct(pid){
  var p=DB.products.find(function(x){return x.id===pid});if(!p)return;
  var name=prompt('新名称：',p.name);if(!name||!name.trim())return;
  var price=parseFloat(prompt('新单价：',p.price));if(isNaN(price)||price<=0)return;
  var unit=prompt('新单位：',p.unit)||'份';
  var desc=prompt('新描述：',p.desc)||'';
  var catOptions=DB.cats.map(function(c){return c.type+'='+c.name}).join(', ');
  var cat=prompt('新分类（'+catOptions+'）：',p.cat);if(!cat||!cat.trim())return;
  var stock=parseInt(prompt('新库存：',p.stock));
  var alert=parseInt(prompt('新预警值：',p.alert));
  var emoji=prompt('新emoji：',p.emoji)||'🍽️';
  var hot=confirm('是否设为热销？（当前：'+(p.hot?'是':'否')+'）');
  p.name=name.trim();p.price=price;p.unit=unit;p.desc=desc;p.cat=cat.trim();p.tag=cat.trim();p.stock=stock;p.alert=alert;p.emoji=emoji;p.hot=hot;toast('菜品已更新');updateUI();
}
function deleteProduct(pid){
  var p=DB.products.find(function(x){return x.id===pid});if(!p)return;
  if(!confirm('确定删除「'+p.name+'」？'))return;
  DB.products=DB.products.filter(function(x){return x.id!==pid});toast('菜品已删除');updateUI();
}
